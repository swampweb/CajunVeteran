<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CajunVeteran Workshop</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#c98232" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workshop" />
  <style>
    :root{--bg:#06111e;--panel:#0b2136;--panel2:#081a2c;--muted:#9fb0c4;--text:#f4f7fb;--accent:#c98232;--danger:#ef4444;--ok:#10b981;--line:#31587d;--blue:#2f80ed;--green:#41b86a;--gold:#f0b429}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;margin:0;background:linear-gradient(180deg,#06111e,#02070d);color:var(--text);font:16px/1.35 "Segoe UI",Roboto,Arial,sans-serif}body{padding-bottom:calc(82px + env(safe-area-inset-bottom))}.app{max-width:620px;margin:0 auto;min-height:100vh}.top{position:sticky;top:0;z-index:10;padding:calc(14px + env(safe-area-inset-top)) 14px 12px;background:rgba(3,10,17,.96);border-bottom:2px solid rgba(201,130,50,.72);backdrop-filter:blur(12px)}.brand{display:flex;align-items:center;gap:12px}.brand img{width:54px;height:54px;border-radius:13px;box-shadow:0 8px 22px rgba(0,0,0,.35)}.brand h1{margin:0;color:var(--accent);font-size:22px;text-transform:uppercase;line-height:1}.brand p{margin:3px 0 0;color:#f8ead0;font-size:12px;letter-spacing:.12em;font-weight:900}.search{margin-top:12px;width:100%;min-height:48px;border-radius:12px;padding:0 14px;border:1px solid #3b5f83;background:#07182a;color:#fff;font-size:17px}.status-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:12px 14px}.tab{border:1px solid rgba(86,142,198,.45);border-radius:14px;background:#10283f;color:#fff;padding:12px 8px;text-align:center;font-weight:900}.tab.active{background:linear-gradient(135deg,var(--accent),#e5a91f);border-color:#e5a91f;color:#071321}.tab span{display:block;font-size:25px;line-height:1}.tab small{display:block;margin-top:3px;color:inherit;opacity:.82;text-transform:uppercase;font-size:11px}.quick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px 12px}.quick .pill{background:#081d31;border:1px solid rgba(86,142,198,.35);border-radius:12px;padding:10px}.pill b{display:block;color:#ffd36a}.pill span{display:block;color:var(--muted);font-size:12px}.cards{display:grid;gap:10px;padding:0 14px 16px}.job{background:linear-gradient(180deg,rgba(13,31,50,.99),rgba(8,22,36,.99));border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:0 10px 24px rgba(0,0,0,.22)}.job-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.type{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900;text-transform:uppercase;background:rgba(201,130,50,.14);border:1px solid rgba(201,130,50,.38);color:#ffd36a}.type.print{color:#7ec7ff;background:rgba(47,128,237,.14);border-color:rgba(47,128,237,.4)}.id{font-size:22px;font-weight:900;margin:6px 0 3px}.title{font-weight:800;color:#f4f7fb;margin-bottom:8px}.meta{color:#dce8f6;display:grid;gap:4px;font-size:14px}.meta b{color:#6bbcff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{min-height:44px;border:1px solid #3b5f83;background:#10283f;color:#fff;border-radius:10px;font-weight:900}.btn.gold{background:linear-gradient(135deg,var(--accent),#e5a91f);border-color:#e5a91f;color:#071321}.btn.danger{background:#ef4444;border-color:#b91c1c}.select-row{display:grid;grid-template-columns:1fr 116px;gap:8px;margin-top:10px}.status-select{min-height:44px;border:1px solid #3b5f83;background:#07182a;color:#fff;border-radius:10px;padding:0 10px;font-weight:800}.paid{display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(86,142,198,.35);background:#07182a;border-radius:10px;padding:0 10px;font-weight:900}.paid input{width:22px;height:22px}.empty{padding:26px;margin:0 14px;border:1px dashed rgba(86,142,198,.5);border-radius:16px;text-align:center;color:var(--muted);background:rgba(8,22,36,.75)}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(3,10,17,.96);border-top:1px solid rgba(86,142,198,.4);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 10px calc(8px + env(safe-area-inset-bottom));max-width:620px;margin:0 auto}.bottom a,.bottom button{border:0;background:transparent;color:#e8eef7;text-decoration:none;font-weight:800;display:grid;place-items:center;gap:3px;font-size:12px}.bottom i{font-style:normal;font-size:23px}.bottom .active{color:var(--accent)}.modal{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:18px}.hidden{display:none!important}.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.72)}.box{position:relative;z-index:1;width:min(560px,94vw);max-height:84vh;overflow:auto;background:#0b2136;border:1px solid rgba(240,180,41,.6);border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.55);padding:18px}.box h3{margin:0 42px 10px 0;color:var(--accent);text-transform:uppercase}.close{position:absolute;right:10px;top:10px;width:38px;height:38px;border-radius:9px;border:1px solid #b91c1c;background:#ef4444;color:#fff;font-size:24px}.box textarea{width:100%;min-height:180px;border:1px solid #3b5f83;background:#07182a;color:#fff;border-radius:12px;padding:12px;font-size:16px}.file-card{border:1px solid rgba(86,142,198,.28);background:rgba(255,255,255,.045);border-radius:10px;padding:10px;margin-bottom:10px}.file-card a{color:#ffd36a;text-decoration:none}.file-card img{max-width:100%;border-radius:10px;border:1px solid #31587d;background:#07182a;margin-top:8px}.footer-note{padding:4px 14px 18px;color:var(--muted);font-size:12px;text-align:center}@media(min-width:720px){.app{margin-top:12px;border:1px solid rgba(86,142,198,.35);border-radius:18px;overflow:hidden}.top{border-radius:18px 18px 0 0}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><img src="apple-touch-icon.png" alt="CajunVeteran Workshop"><div><h1>CajunVeteran</h1><p>Workshop Job Board</p></div></div>
    <input id="search" class="search" placeholder="Search jobs, orders, customers..." />
  </header>
  <nav class="status-tabs">
    <button class="tab active" data-tab="new"><span id="countNew">0</span><small>New</small></button>
    <button class="tab" data-tab="in_progress"><span id="countProgress">0</span><small>In Progress</small></button>
    <button class="tab" data-tab="completed"><span id="countComplete">0</span><small>Complete</small></button>
  </nav>
  <section class="quick">
    <div class="pill"><b id="countWood">0</b><span>Woodworking Active</span></div>
    <div class="pill"><b id="countPrint">0</b><span>3D Print Active</span></div>
  </section>
  <main id="cards" class="cards"></main>
  <p class="footer-note">This iPhone view is for quick job monitoring and small updates. Full editing stays on Admin/Woodworking.</p>
</div>
<nav class="bottom">
  <button class="active" data-bottom="jobs"><i>📋</i><span>Jobs</span></button>
  <a href="admin.html"><i>🧰</i><span>Admin</span></a>
  <a href="woodworking.html"><i>🪵</i><span>Wood</span></a>
  <a href="reports.html"><i>📊</i><span>Reports</span></a>
</nav>
<div id="notesModal" class="modal hidden"><div class="backdrop" data-close></div><div class="box"><button class="close" data-close>×</button><h3 id="notesTitle">Notes</h3><textarea id="notesText"></textarea><div class="actions"><button class="btn" data-close>Cancel</button><button id="saveNotes" class="btn gold">Save</button></div></div></div>
<div id="filesModal" class="modal hidden"><div class="backdrop" data-close-files></div><div class="box"><button class="close" data-close-files>×</button><h3 id="filesTitle">Files</h3><div id="filesBody"></div></div></div>
<script>
const STORE_KEY='inventory_orders_store_v9', WOOD_JOBS_KEY='cv_woodworking_jobs_v1', WOOD_ITEMS_KEY='cv_woodworking_items_v1';
const $=id=>document.getElementById(id);let currentTab='new',currentNotes=null;
function load(k,fb){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(fb))}catch{return fb}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function num(n){return Number(n||0)||0}function money(n){return '$'+num(n).toFixed(2)}
function fmtDate(s){if(!s)return'No date';if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString()}try{return new Date(s).toLocaleDateString()}catch{return s}}
function cleanStatus(s){s=String(s||'new').toLowerCase();if(['quote','approved','new'].includes(s))return'new';if(['in_progress','in process','printing','cutting'].includes(s))return'in_progress';if(['completed','complete','shipped','delivered'].includes(s))return'completed';return s}
function isActive(j){return ['new','in_progress','completed'].includes(cleanStatus(j.status))}
function gather(){const store=load(STORE_KEY,{items:[],orders:[],colors:[]});const wood=load(WOOD_JOBS_KEY,[]);const items=load(WOOD_ITEMS_KEY,[]);const jobs=[];(store.orders||[]).forEach(o=>{const first=(o.lines||[])[0]||{};const item=(store.items||[]).find(i=>String(i.sku)===String(first.sku))||{};jobs.push({type:'print',key:'print:'+o.orderId,id:o.orderId||'',title:item.name||((o.lines||[]).map(l=>l.sku).join(', ')||'3D Print Order'),customer:o.customer||'',due:o.dueDate||o.orderDate||'',status:cleanStatus(o.status),paid:!!o.paid,notes:o.notes||'',files:Array.isArray(o.files)?o.files:[],total:(o.lines||[]).reduce((a,l)=>{const it=(store.items||[]).find(i=>String(i.sku)===String(l.sku))||{};return a+num(it.price)*num(l.qty||1)},0)})});wood.forEach(j=>{const match=items.find(i=>String(i.id)===String(j.sourceItemId)||String(i.name).trim().toLowerCase()===String(j.project).trim().toLowerCase())||{};jobs.push({type:'wood',key:'wood:'+j.id,sourceId:j.id,id:j.jobId||'',title:j.project||'',customer:j.customer||'',due:j.dueDate||'',status:cleanStatus(j.status),paid:!!j.paid,notes:j.notes||'',files:Array.isArray(j.files)?j.files:[],plans:Array.isArray(match.plans)?match.plans:[],total:num(j.total)})});return jobs}
function saveJob(job,patch){if(job.type==='print'){const store=load(STORE_KEY,{items:[],orders:[],colors:[]});const o=(store.orders||[]).find(x=>String(x.orderId)===String(job.id));if(o){Object.assign(o,patch);save(STORE_KEY,store)}}else{const arr=load(WOOD_JOBS_KEY,[]);const j=arr.find(x=>String(x.id)===String(job.sourceId));if(j){Object.assign(j,patch);save(WOOD_JOBS_KEY,arr)}}render()}
function counts(){const all=gather();$('countNew').textContent=all.filter(j=>isActive(j)&&j.status==='new').length;$('countProgress').textContent=all.filter(j=>isActive(j)&&j.status==='in_progress').length;$('countComplete').textContent=all.filter(j=>isActive(j)&&j.status==='completed').length;$('countWood').textContent=all.filter(j=>j.type==='wood'&&isActive(j)).length;$('countPrint').textContent=all.filter(j=>j.type==='print'&&isActive(j)).length}
function card(j){return `<article class="job"><div class="job-head"><div><span class="type ${j.type==='print'?'print':''}">${j.type==='wood'?'🪵 Woodworking':'🖨️ 3D Print'}</span><div class="id">${j.id||'No ID'}</div><div class="title">${j.title||'Untitled Job'}</div></div><div style="text-align:right;color:#ffd36a;font-weight:900">${money(j.total)}</div></div><div class="meta"><div>👤 <b>${j.customer||'No customer'}</b></div><div>📅 Due: <b>${fmtDate(j.due)}</b></div><div>💲 Paid: <b>${j.paid?'Yes':'No'}</b></div></div><div class="select-row"><select class="status-select" data-status="${j.key}"><option value="new" ${j.status==='new'?'selected':''}>New</option><option value="in_progress" ${j.status==='in_progress'?'selected':''}>In Progress</option><option value="completed" ${j.status==='completed'?'selected':''}>Complete</option><option value="delivered" ${j.status==='delivered'?'selected':''}>Delivered</option></select><label class="paid">Paid <input type="checkbox" data-paid="${j.key}" ${j.paid?'checked':''}></label></div><div class="actions"><button class="btn" data-notes="${j.key}">📝 Notes</button><button class="btn" data-files="${j.key}" ${(j.files.length||j.plans?.length)?'':'disabled'}>📁 Files</button></div></article>`}
function render(){counts();let jobs=gather().filter(isActive).filter(j=>j.status===currentTab);const q=$('search').value.toLowerCase().trim();if(q)jobs=jobs.filter(j=>`${j.id} ${j.title} ${j.customer}`.toLowerCase().includes(q));jobs.sort((a,b)=>String(a.due||'9999').localeCompare(String(b.due||'9999')));$('cards').innerHTML=jobs.length?jobs.map(card).join(''):`<div class="empty">No ${currentTab.replace('_',' ')} jobs found.</div>`}
function findJob(key){return gather().find(j=>j.key===key)}function open(id){$(id).classList.remove('hidden')}function close(id){$(id).classList.add('hidden')}
function isImage(f){const n=String(f.name||f.storedName||f.url||'').split('?')[0].toLowerCase();return ['png','jpg','jpeg','webp','gif','svg'].includes(n.split('.').pop())||String(f.type||'').startsWith('image/')}
function fileCard(f){const name=f.name||f.storedName||'File';if(isImage(f))return `<div class="file-card"><a href="${f.url}" target="_blank">🖼️ ${name}</a><img src="${f.url}" alt="${name}"></div>`;return `<div class="file-card"><a href="${f.url}" target="_blank" download>📎 ${name}</a></div>`}
document.addEventListener('click',e=>{const t=e.target.closest('[data-tab]');if(t){currentTab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));render()}const n=e.target.closest('[data-notes]');if(n){const j=findJob(n.dataset.notes);if(j){currentNotes=j;$('notesTitle').textContent='Notes - '+(j.id||'Job');$('notesText').value=j.notes||'';open('notesModal')}}const f=e.target.closest('[data-files]');if(f){const j=findJob(f.dataset.files);if(j){$('filesTitle').textContent='Files - '+(j.id||'Job');const files=[...(j.files||[]),...(j.plans||[])];$('filesBody').innerHTML=files.length?files.map(fileCard).join(''):'<p>No files attached.</p>';open('filesModal')}}if(e.target.closest('[data-close]'))close('notesModal');if(e.target.closest('[data-close-files]'))close('filesModal')});
document.addEventListener('change',e=>{const s=e.target.closest('[data-status]');if(s){const j=findJob(s.dataset.status);if(j)saveJob(j,{status:s.value})}const p=e.target.closest('[data-paid]');if(p){const j=findJob(p.dataset.paid);if(j)saveJob(j,{paid:!!p.checked})}});
$('saveNotes').addEventListener('click',()=>{if(currentNotes){saveJob(currentNotes,{notes:$('notesText').value.trim()});currentNotes=null;close('notesModal')}});$('search').addEventListener('input',render);if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{});}render();
</script>
</body>
</html>
