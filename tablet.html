  <style>

0,.2)}.kpi b{display:block;font-size:12px;text-transform:uppercase;color:#dce8f6}.kpi strong{display:block;font-size:28px;line-height:1;margin:4px 0}.kpi span{display:block;color:var(--muted);font-size:12px}.toolbar{background:rgba(8,22,36,.98);border:1px solid rgba(86,142,198,.35);border-radius:12px;padding:10px;margin-bottom:12px}.filters{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:10px}.filter-btn{min-height:48px;border:1px solid rgba(86,142,198,.45);border-radius:9px;background:#10283f;color:#fff;font-size:16px;font-weight:900}.filter-btn.active{background:linear-gradient(135deg,var(--accent),#e5a91f);color:#071321;border-color:#e5a91f}.search-row{display:grid;grid-template-columns:1fr 130px 130px;gap:10px}.search,.select{min-height:50px;border:1px solid #3b5f83;border-radius:9px;background:#07182a;color:#fff;padding:0 14px;font-size:17px}.cards{display:grid;gap:12px}.job-card{display:grid;grid-template-columns:76px 132px minmax(0,1.35fr) minmax(300px,1fr) 140px;gap:14px;align-items:center;background:linear-gradient(180deg,rgba(13,31,50,.99),rgba(8,22,36,.99));border:1px solid var(--line);border-radius:13px;overflow:hidden;padding:12px;box-shadow:0 10px 24px rgba(0,0,0,.22)}.priority{align-self:stretch;background:rgba(3,10,17,.35);border-radius:10px;display:grid;place-items:center;text-align:center;font-weight:900}.priority strong{display:block;font-size:34px;color:var(--accent)}.priority span{display:block;text-transform:uppercase;font-size:12px;color:#ffd36a}.thumb{width:132px;height:112px;border-radius:10px;object-fit:cover;background:#07182a;border:1px solid rgba(86,142,198,.4);display:grid;place-items:center;color:#ffd36a;font-size:42px}.info{min-width:0}.type{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;text-transform:uppercase;background:rgba(201,130,50,.14);border:1px solid rgba(201,130,50,.38);color:#ffd36a;margin-bottom:6px}.type.print{color:#7ec7ff;background:rgba(47,128,237,.14);border-color:rgba(47,128,237,.4)}.job-id{font-size:28px;font-weight:900;line-height:1;margin:0}.job-title{font-size:18px;font-weight:900;margin:5px 0 8px;white-space:normal;line-height:1.25}.meta{display:grid;gap:4px;color:#dce8f6}.meta span{display:flex;gap:7px;align-items:center}.meta b{color:#6bbcff;font-weight:800}.controls{display:grid;gap:10px}.status-label{color:#dce8f6;font-size:12px;text-transform:uppercase;font-weight:900}.status-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}.status-btn{min-height:44px;border:1px solid #31587d;background:#07182a;color:#fff;border-radius:8px;font-weight:800}.status-btn.active{background:linear-gradient(135deg,var(--accent),#e5a91f);border-color:#e5a91f;color:#071321}.money-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.money-box{border:1px solid rgba(86,142,198,.35);background:#07182a;border-radius:9px;padding:8px}.money-box span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase}.money-box b{display:block;font-size:21px;margin-top:2px}.profit{color:#41b86a}.actions{display:grid;gap:9px}.paid-wrap{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:900}.toggle{position:relative;width:60px;height:32px}.toggle input{display:none}.slider{position:absolute;inset:0;border-radius:999px;background:#334155;border:1px solid #64748b;transition:.18s}.slider:before{content:'';position:absolute;width:26px;height:26px;left:3px;top:2px;border-radius:50%;background:#fff;transition:.18s}input:checked+.slider{background:#22c55e;border-color:#22c55e}input:checked+.slider:before{transform:translateX(27px)}.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.small-btn{min-height:42px;border:1px solid #3b5f83;border-radius:8px;background:#10283f;color:#fff;font-weight:900}.small-btn:disabled{opacity:.35}.empty{border:1px dashed rgba(86,142,198,.5);border-radius:14px;padding:28px;color:var(--muted);text-align:center;background:rgba(8,22,36,.75)}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(3,10,17,.96);border-top:1px solid rgba(86,142,198,.4);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 12px env(safe-area-inset-bottom)}.bottom-nav a,.bottom-nav button{color:#e8eef7;text-decoration:none;border:0;background:transparent;font-weight:800;display:grid;gap:4px;place-items:center;font-size:12px}.bottom-nav i{font-style:normal;font-size:23px}.bottom-nav .active{color:var(--accent)}.modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}.hidden{display:none!important}.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.72)}.modal-box{position:relative;z-index:1;width:min(700px,94vw);max-height:84vh;overflow:auto;background:#0b2136;border:1px solid rgba(240,180,41,.6);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.55);padding:18px 20px}.modal-box h3{margin:0 0 10px;color:var(--accent);text-transform:uppercase}.modal-close{position:absolute;right:10px;top:10px;width:38px;height:38px;border-radius:8px;border:1px solid #b91c1c;background:#ef4444;color:#fff;font-size:24px}.modal textarea{width:100%;min-height:180px;border:1px solid #3b5f83;background:#07182a;color:#fff;border-radius:10px;padding:12px;font-size:16px}.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}.save{background:linear-gradient(135deg,var(--accent),#e5a91f)!important;color:#071321!important;border-color:#e5a91f!important}@media(max-width:980px){.tablet-shell{padding-bottom:92px}.top{align-items:center}.title{text-align:left}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.filters{grid-template-columns:repeat(3,minmax(0,1fr))}.search-row{grid-template-columns:1fr}.job-card{grid-template-columns:56px 100px minmax(0,1fr);grid-template-areas:'pri thumb info' 'ctrl ctrl ctrl' 'act act act';align-items:start}.priority{grid-area:pri}.thumb{grid-area:thumb;width:100px;height:90px}.info{grid-area:info}.controls{grid-area:ctrl}.actions{grid-area:act;grid-template-columns:180px 1fr;align-items:center}.action-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:620px){.top{display:grid;grid-template-columns:1fr auto}.title{grid-column:1/-1}.top-actions{justify-content:flex-end}.kpis{grid-template-columns:1fr}.filters{grid-template-columns:repeat(2,minmax(0,1fr))}.job-card{grid-template-columns:1fr;grid-template-areas:'info' 'thumb' 'ctrl' 'act'}.priority{display:none}.thumb{width:100%;height:160px}.actions{grid-template-columns:1fr}.action-grid{grid-template-columns:1fr 1fr}.status-grid{grid-template-columns:1fr 1fr}.money-row{grid-template-columns:1fr 1fr}}

.float-menu{position:fixed;right:18px;bottom:92px;z-index:70}.float-menu summary{list-style:none;width:66px;height:66px;border-radius:50%;border:1px solid rgba(240,180,41,.75);background:linear-gradient(135deg,var(--accent),#e5a91f);color:#071321;font-size:30px;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.45);cursor:pointer;display:grid;place-items:center}.float-menu summary::-webkit-details-marker{display:none}.float-menu[open] summary{transform:rotate(90deg)}.float-menu-panel{position:absolute;right:0;bottom:78px;width:min(320px,calc(100vw - 36px));background:linear-gradient(180deg,rgba(13,31,50,.99),rgba(8,22,36,.99));border:1px solid rgba(240,180,41,.55);border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.58);padding:12px}.float-menu-panel h3{margin:4px 8px 10px;color:var(--accent);font-size:16px;text-transform:uppercase;letter-spacing:.05em}.float-menu-panel a{min-height:50px;margin:6px 0;border:1px solid rgba(86,142,198,.45);border-radius:10px;background:#10283f;color:#fff;text-decoration:none;display:flex;align-items:center;gap:12px;padding:0 13px;font-size:16px;font-weight:900}.float-menu-panel a:hover,.float-menu-panel a:focus{border-color:var(--accent);background:rgba(240,180,41,.12);color:#ffd36a}.float-menu-note{font-size:12px;color:var(--muted);margin:10px 8px 4px;line-height:1.3}@media(max-width:620px){.float-menu{right:14px;bottom:86px}.float-menu summary{width:60px;height:60px}.float-menu-panel{right:0;bottom:72px}}

<script>
const STORE_KEY='inventory_orders_store_v9', WOOD_JOBS_KEY='cv_woodworking_jobs_v1', WOOD_ITEMS_KEY='cv_woodworking_items_v1', MAT_INV_KEY='cv_woodworking_material_inventory_v1';
const $=id=>document.getElementById(id);const money=n=>'$'+(Number(n||0)).toFixed(2);const num=n=>Number(n||0)||0;let currentFilter='all', currentNotesJob=null;
function load(k,fb){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(fb))}catch{return fb}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function fmtDate(s){if(!s)return''; if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString()} try{return new Date(s).toLocaleDateString()}catch{return s}}
function dueDays(s){if(!s)return 9999;const d=new Date(s);if(isNaN(d))return 9999;const today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-today)/(1000*60*60*24))}
function statusText(s,type){const map={new:'New',in_progress:'In Progress',completed:'Completed',delivered:'Delivered',shipped:'Delivered',quote:'Quote',approved:'Approved'};return map[s]||s||'New'}
function isDone(s){return ['completed','delivered','shipped'].includes(String(s||'').toLowerCase())}
function matCostFromUses(uses){return num(0)}
function gatherJobs(){const store=load(STORE_KEY,{items:[],orders:[],colors:[]});const woodJobs=load(WOOD_JOBS_KEY,[]);const woodItems=load(WOOD_ITEMS_KEY,[]);const jobs=[];(store.orders||[]).forEach((o,idx)=>{const first=(o.lines||[])[0]||{};const item=(store.items||[]).find(i=>String(i.sku)===String(first.sku))||{};const revenue=(o.lines||[]).reduce((a,l)=>{const it=(store.items||[]).find(i=>String(i.sku)===String(l.sku))||{};return a+(num(it.price)*num(l.qty||1))},0);const cost=(o.lines||[]).reduce((a,l)=>{const it=(store.items||[]).find(i=>String(i.sku)===String(l.sku))||{};return a+(num(it.costMaterial)*num(l.qty||1))},0);jobs.push({type:'print',key:'print:'+o.orderId,sourceIndex:idx,id:o.orderId||'',title:item.name||((o.lines||[]).map(l=>l.sku).join(', ')||'3D Print Order'),customer:o.customer||'',due:o.dueDate||o.orderDate||'',status:o.status||'new',paid:!!o.paid,total:revenue,profit:revenue-cost,priority:num(o.priority||3),notes:o.notes||'',image:item.image||'',plans:[],photos:item.image?[{name:item.name||'Item Photo',url:item.image}]:[], files:Array.isArray(o.files)?o.files:[]})});woodJobs.forEach((j,idx)=>{const match=woodItems.find(i=>String(i.id)===String(j.sourceItemId)||String(i.name).trim().toLowerCase()===String(j.project).trim().toLowerCase())||{};jobs.push({type:'wood',key:'wood:'+j.id,sourceIndex:idx,id:j.jobId||'',title:j.project||'',customer:j.customer||'',due:j.dueDate||'',status:j.status||'quote',paid:!!j.paid,total:num(j.total),profit:num(j.total)-num(j.jobMaterialCost),priority:num(j.priority||3),notes:j.notes||'',image:'',plans:Array.isArray(match.plans)?match.plans:[],photos:[],files:Array.isArray(j.files)?j.files:[]})});return jobs}
function saveJob(job,patch){if(job.type==='print'){const store=load(STORE_KEY,{items:[],orders:[],colors:[]});const o=(store.orders||[]).find(x=>String(x.orderId)===String(job.id));if(o){Object.assign(o,patch);save(STORE_KEY,store)}}else{const arr=load(WOOD_JOBS_KEY,[]);const j=arr.find(x=>String(x.id)===String(job.key.replace('wood:',''))||String(x.jobId)===String(job.id));if(j){Object.assign(j,patch);save(WOOD_JOBS_KEY,arr)}}render()}
function filteredJobs(){let jobs=gatherJobs();const q=$('searchBox').value.trim().toLowerCase();if(q)jobs=jobs.filter(j=>`${j.id} ${j.title} ${j.customer} ${j.status}`.toLowerCase().includes(q));if(currentFilter==='wood')jobs=jobs.filter(j=>j.type==='wood');if(currentFilter==='print')jobs=jobs.filter(j=>j.type==='print');if(currentFilter==='active')jobs=jobs.filter(j=>!isDone(j.status));if(currentFilter==='unpaid')jobs=jobs.filter(j=>!j.paid);if(currentFilter==='due')jobs=jobs.filter(j=>dueDays(j.due)<=7&&!isDone(j.status));const sort=$('sortBy').value;jobs.sort((a,b)=>{if(sort==='priority')return a.priority-b.priority;if(sort==='profit')return b.profit-a.profit;if(sort==='status')return String(a.status).localeCompare(String(b.status));return dueDays(a.due)-dueDays(b.due)});return jobs}
function renderKpis(){const jobs=gatherJobs();const active=jobs.filter(j=>!isDone(j.status)).length, wood=jobs.filter(j=>j.type==='wood'&&!isDone(j.status)).length, print=jobs.filter(j=>j.type==='print'&&!isDone(j.status)).length, unpaid=jobs.filter(j=>!j.paid).length, due=jobs.filter(j=>dueDays(j.due)<=7&&!isDone(j.status)).length;$('kpiRow').innerHTML=[['📋','Active Jobs',active,'In progress'],['🪵','Woodworking',wood,'Active'],['🖨️','3D Print',print,'Active'],['💲','Unpaid',unpaid,'Awaiting payment'],['📅','Due Soon',due,'Next 7 days']].map(x=>`<div class="kpi"><i>${x[0]}</i><div><b>${x[1]}</b><strong>${x[2]}</strong><span>${x[3]}</span></div></div>`).join('')}
function statusButtons(job){const opts=job.type==='wood'?[['quote','Quote'],['in_progress','In Progress'],['completed','Completed'],['delivered','Delivered']]:[['new','New'],['in_progress','In Progress'],['completed','Completed'],['shipped','Delivered']];return opts.map(o=>`<button class="status-btn ${job.status===o[0]?'active':''}" data-status="${o[0]}" data-key="${job.key}">${o[1]}</button>`).join('')}
function thumb(job){if(job.image)return `<img class="thumb" src="${job.image}" alt="${job.title}">`;return `<div class="thumb">${job.type==='wood'?'🪵':'🖨️'}</div>`}
function card(job,i){const pri=job.priority<=1?'HIGH':job.priority<=3?'MEDIUM':'NORMAL';return `<article class="job-card ${$('viewMode').value==='compact'?'compact':''}"><div class="priority"><strong>${job.priority||i+1}</strong><span>${pri}</span></div>${thumb(job)}<div class="info"><span class="type ${job.type==='print'?'print':''}">${job.type==='wood'?'🪵 Woodworking':'🖨️ 3D Printing'}</span><p class="job-id">${job.id||'No ID'}</p><div class="job-title">${job.title||'Untitled Job'}</div><div class="meta"><span>👤 <b>${job.customer||'No customer'}</b></span><span>📅 Due: <b>${fmtDate(job.due)||'No date'}</b></span></div></div><div class="controls"><div><div class="status-label">Status</div><div class="status-grid">${statusButtons(job)}</div></div><div class="money-row"><div class="money-box"><span>Total</span><b>${money(job.total)}</b></div><div class="money-box"><span>Profit</span><b class="profit">${money(job.profit)}</b></div></div></div><div class="actions"><div class="paid-wrap"><span>Paid</span><label class="toggle"><input type="checkbox" data-paid="${job.key}" ${job.paid?'checked':''}><span class="slider"></span></label><span>${job.paid?'Yes':'No'}</span></div><div class="action-grid"><button class="small-btn" data-files="${job.key}" ${job.files&&job.files.length?'':'disabled'}>Files</button><button class="small-btn" data-notes="${job.key}">Notes</button><button class="small-btn" data-plans="${job.key}" ${job.plans.length?'':'disabled'}>${job.type==='wood'?'Plans':'STL'}</button><button class="small-btn" data-photos="${job.key}" ${job.photos.length?'':'disabled'}>Photos</button><button class="small-btn" data-details="${job.key}">Details</button></div></div></article>`}
function renderCards(){const jobs=filteredJobs();$('jobCards').innerHTML=jobs.length?jobs.map(card).join(''):'<div class="empty">No jobs match this view.</div>'}
function render(){renderKpis();renderCards()}
function findJob(key){return gatherJobs().find(j=>j.key===key)}
function openModal(id){$(id).classList.remove('hidden');$(id).setAttribute('aria-hidden','false')}function closeModal(id){$(id).classList.add('hidden');$(id).setAttribute('aria-hidden','true')}
document.addEventListener('click',e=>{const f=e.target.closest('[data-filter]');if(f){currentFilter=f.dataset.filter;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===f));render()}const short=e.target.closest('[data-filter-short]');if(short){currentFilter=short.dataset.filterShort;render()}const st=e.target.closest('[data-status]');if(st){const job=findJob(st.dataset.key);if(job)saveJob(job,{status:st.dataset.status})}const notes=e.target.closest('[data-notes]');if(notes){currentNotesJob=findJob(notes.dataset.notes);if(currentNotesJob){$('notesTitle').textContent=`Notes — ${currentNotesJob.id}`;$('notesText').value=currentNotesJob.notes||'';openModal('notesModal')}}const plans=e.target.closest('[data-plans]');if(plans){const job=findJob(plans.dataset.plans);if(job){$('infoTitle').textContent=`Plans — ${job.id}`;$('infoBody').innerHTML=job.plans.length?job.plans.map(p=>`<p><a style="color:#ffd36a" href="${p.url}" target="_blank">📐 ${p.name||p.storedName||'Plan File'}</a></p>`).join(''):'<p>No plans linked.</p>';openModal('infoModal')}}const photos=e.target.closest('[data-photos]');if(photos){const job=findJob(photos.dataset.photos);if(job){$('infoTitle').textContent=`Photos — ${job.id}`;$('infoBody').innerHTML=job.photos.length?job.photos.map(p=>`<p><img src="${p.url}" style="max-width:100%;border-radius:10px;border:1px solid #31587d"></p>`).join(''):'<p>No photos linked.</p>';openModal('infoModal')}}const files=e.target.closest('[data-files]');if(files){const job=findJob(files.dataset.files);if(job){$('infoTitle').textContent=`Job Files — ${job.id}`;$('infoBody').innerHTML=job.files&&job.files.length?job.files.map(f=>`<p><a style="color:#ffd36a" href="${f.url}" target="_blank">📁 ${f.name||f.storedName||'Job File'}</a></p>`).join(''):'<p>No job files linked.</p>';openModal('infoModal')}}const det=e.target.closest('[data-details]');if(det){const job=findJob(det.dataset.details);if(job){$('infoTitle').textContent=`Details — ${job.id}`;$('infoBody').innerHTML=`<p><b>Type:</b> ${job.type==='wood'?'Woodworking':'3D Printing'}</p><p><b>Customer:</b> ${job.customer||'—'}</p><p><b>Item:</b> ${job.title||'—'}</p><p><b>Due:</b> ${fmtDate(job.due)||'—'}</p><p><b>Status:</b> ${statusText(job.status)}</p><p><b>Total:</b> ${money(job.total)}</p><p><b>Profit:</b> ${money(job.profit)}</p>`;openModal('infoModal')}}if(e.target.closest('[data-close-modal]'))closeModal('notesModal');if(e.target.closest('[data-close-info]'))closeModal('infoModal');if(e.target.closest('[data-focus-search]')){$('searchBox').focus()}})
document.addEventListener('change',e=>{const p=e.target.closest('[data-paid]');if(p){const job=findJob(p.dataset.paid);if(job)saveJob(job,{paid:!!p.checked})}})
$('saveNotesBtn').addEventListener('click',()=>{if(currentNotesJob){saveJob(currentNotesJob,{notes:$('notesText').value.trim()});currentNotesJob=null;closeModal('notesModal')}});$('searchBox').addEventListener('input',renderCards);$('sortBy').addEventListener('change',renderCards);$('viewMode').addEventListener('change',renderCards);$('syncBtn').addEventListener('click',render);
render();
</script>
</body>
</html>
